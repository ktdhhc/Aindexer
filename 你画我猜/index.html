<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你画我猜 Demo</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #1a1e29;
      --sub: #5a6475;
      --primary: #0d7a6f;
      --primary-2: #17a28d;
      --line: #dbe2ee;
      --danger: #d64545;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% -20%, #dff7f3 0%, transparent 45%),
                  radial-gradient(circle at 90% 0%, #eaf0ff 0%, transparent 38%),
                  var(--bg);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: 300px 1fr;
    }

    .panel, .board {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 26px rgba(20, 31, 56, 0.08);
    }

    .panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: fit-content;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub {
      margin: 0;
      font-size: 13px;
      color: var(--sub);
    }

    .stat {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fbfdff;
    }

    .stat-label {
      display: block;
      color: var(--sub);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat-val {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .word-box {
      border: 1px dashed var(--primary-2);
      border-radius: 12px;
      padding: 12px;
      background: #f3fffc;
    }

    .word-label {
      color: var(--sub);
      font-size: 12px;
      margin-bottom: 6px;
      display: block;
    }

    .word {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      min-height: 36px;
    }

    .hint {
      color: var(--sub);
      font-size: 12px;
      margin-top: 4px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      transition: transform .1s ease, opacity .15s ease;
    }

    button:active { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .btn-main {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      font-weight: 600;
      flex: 1;
    }

    .btn-light {
      background: #eef3fb;
      color: #23304b;
      border: 1px solid #dae5f7;
    }

    .btn-danger {
      background: #ffe9e9;
      color: var(--danger);
      border: 1px solid #f8c7c7;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #98b4ff;
      box-shadow: 0 0 0 3px rgba(80, 120, 255, 0.15);
    }

    .msg {
      min-height: 22px;
      font-size: 14px;
      color: var(--sub);
    }

    .msg.ok { color: #127a5d; }
    .msg.err { color: var(--danger); }

    .board {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .canvas-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      position: relative;
      min-height: 500px;
    }

    canvas {
      width: 100%;
      height: 500px;
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .board-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .size {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--sub);
    }

    .size input { accent-color: var(--primary); }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .canvas-wrap, canvas { min-height: 360px; height: 360px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div>
        <h1>你画我猜</h1>
        <p class="sub">单机演示版：一人作画，一人猜词</p>
      </div>

      <div class="stat">
        <div class="stat-card">
          <span class="stat-label">倒计时</span>
          <span id="timer" class="stat-val">60</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">得分</span>
          <span id="score" class="stat-val">0</span>
        </div>
      </div>

      <div class="word-box">
        <span class="word-label">本轮词语（给作画者看）</span>
        <div id="word" class="word">点击“开始新回合”</div>
        <div id="wordHint" class="hint">猜词者请先闭眼，3 秒后词语会隐藏</div>
      </div>

      <button id="startBtn" class="btn-main">开始新回合</button>

      <div>
        <label class="sub" for="guessInput">输入你的猜测</label>
        <input id="guessInput" type="text" placeholder="例如：猫 / 自行车 / 西瓜">
      </div>

      <div class="row">
        <button id="guessBtn" class="btn-light">提交猜词</button>
        <button id="skipBtn" class="btn-danger">跳过本轮</button>
      </div>

      <div id="msg" class="msg"></div>
    </section>

    <section class="board">
      <div class="board-tools">
        <div class="size">
          <span>画笔粗细</span>
          <input id="sizeRange" type="range" min="2" max="24" value="6">
          <span id="sizeVal">6</span>
        </div>
        <div class="row">
          <button id="undoBtn" class="btn-light">撤销</button>
          <button id="clearBtn" class="btn-light">清空画布</button>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="board"></canvas>
      </div>
    </section>
  </main>

  <script>
    const words = [
      "猫", "狗", "冰箱", "手机", "香蕉", "飞机", "自行车", "西瓜", "牙刷", "雨伞",
      "灯泡", "长颈鹿", "熊猫", "汉堡", "火车", "城堡", "吉他", "电脑", "雪人", "太阳"
    ];

    const state = {
      currentWord: "",
      score: 0,
      timeLeft: 60,
      timerId: null,
      roundOn: false
    };

    const el = {
      timer: document.getElementById("timer"),
      score: document.getElementById("score"),
      word: document.getElementById("word"),
      wordHint: document.getElementById("wordHint"),
      startBtn: document.getElementById("startBtn"),
      guessInput: document.getElementById("guessInput"),
      guessBtn: document.getElementById("guessBtn"),
      skipBtn: document.getElementById("skipBtn"),
      msg: document.getElementById("msg"),
      undoBtn: document.getElementById("undoBtn"),
      clearBtn: document.getElementById("clearBtn"),
      sizeRange: document.getElementById("sizeRange"),
      sizeVal: document.getElementById("sizeVal"),
      canvas: document.getElementById("board")
    };

    const ctx = el.canvas.getContext("2d");
    let drawing = false;
    let currentStroke = [];
    const strokes = [];
    let brushSize = Number(el.sizeRange.value);

    function resizeCanvas() {
      const rect = el.canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      el.canvas.width = Math.floor(rect.width * ratio);
      el.canvas.height = Math.floor(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      redraw();
    }

    function getPoint(e) {
      const rect = el.canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: src.clientX - rect.left,
        y: src.clientY - rect.top
      };
    }

    function beginStroke(e) {
      e.preventDefault();
      drawing = true;
      currentStroke = [];
      addPoint(e);
    }

    function addPoint(e) {
      if (!drawing) return;
      const p = getPoint(e);
      currentStroke.push({ x: p.x, y: p.y, size: brushSize });
      redraw();
    }

    function endStroke() {
      if (!drawing) return;
      drawing = false;
      if (currentStroke.length > 0) {
        strokes.push([...currentStroke]);
      }
      currentStroke = [];
    }

    function drawStroke(stroke) {
      if (!stroke.length) return;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#1a1e29";
      ctx.beginPath();
      ctx.lineWidth = stroke[0].size || 6;
      ctx.moveTo(stroke[0].x, stroke[0].y);
      for (let i = 1; i < stroke.length; i++) {
        const p = stroke[i];
        ctx.lineWidth = p.size || 6;
        ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }

    function redraw() {
      ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);
      strokes.forEach(drawStroke);
      drawStroke(currentStroke);
    }

    function clearBoard() {
      strokes.length = 0;
      currentStroke = [];
      redraw();
    }

    function setMsg(text, type = "") {
      el.msg.textContent = text;
      el.msg.className = `msg ${type}`.trim();
    }

    function pickWord() {
      return words[Math.floor(Math.random() * words.length)];
    }

    function hideWord() {
      el.word.textContent = "•••";
      el.wordHint.textContent = `提示：共 ${state.currentWord.length} 个字`;
    }

    function stopRound(message = "") {
      state.roundOn = false;
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      if (message) setMsg(message, "err");
    }

    function tick() {
      state.timeLeft -= 1;
      el.timer.textContent = String(state.timeLeft);
      if (state.timeLeft <= 0) {
        stopRound(`时间到，答案是「${state.currentWord}」`);
      }
    }

    function startRound() {
      state.currentWord = pickWord();
      state.timeLeft = 60;
      state.roundOn = true;
      el.timer.textContent = "60";
      el.word.textContent = state.currentWord;
      el.wordHint.textContent = "3 秒后自动隐藏词语";
      el.guessInput.value = "";
      clearBoard();
      setMsg("回合开始，作画者请根据词语画图。");

      setTimeout(() => {
        if (state.roundOn) hideWord();
      }, 3000);

      if (state.timerId) clearInterval(state.timerId);
      state.timerId = setInterval(tick, 1000);
    }

    function normalize(v) {
      return v.trim().replace(/\s+/g, "").toLowerCase();
    }

    function submitGuess() {
      if (!state.roundOn) {
        setMsg("请先开始新回合。", "err");
        return;
      }
      const guess = normalize(el.guessInput.value);
      if (!guess) {
        setMsg("请输入猜测词语。", "err");
        return;
      }
      if (guess === normalize(state.currentWord)) {
        state.score += 1;
        el.score.textContent = String(state.score);
        stopRound("猜对了，得 1 分。");
        setMsg("猜对了，点击“开始新回合”继续。", "ok");
      } else {
        setMsg("不对，再试试。");
      }
    }

    el.startBtn.addEventListener("click", startRound);
    el.guessBtn.addEventListener("click", submitGuess);
    el.skipBtn.addEventListener("click", () => {
      if (!state.roundOn) {
        setMsg("当前没有进行中的回合。", "err");
        return;
      }
      stopRound(`已跳过，本轮答案是「${state.currentWord}」`);
    });

    el.guessInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitGuess();
    });

    el.sizeRange.addEventListener("input", () => {
      brushSize = Number(el.sizeRange.value);
      el.sizeVal.textContent = String(brushSize);
    });

    el.undoBtn.addEventListener("click", () => {
      if (!strokes.length) return;
      strokes.pop();
      redraw();
    });

    el.clearBtn.addEventListener("click", clearBoard);

    el.canvas.addEventListener("mousedown", beginStroke);
    el.canvas.addEventListener("mousemove", addPoint);
    window.addEventListener("mouseup", endStroke);
    el.canvas.addEventListener("mouseleave", endStroke);

    el.canvas.addEventListener("touchstart", beginStroke, { passive: false });
    el.canvas.addEventListener("touchmove", addPoint, { passive: false });
    window.addEventListener("touchend", endStroke, { passive: false });

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
