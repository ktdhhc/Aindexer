<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aindexer V1.6</title>
    <style>
      /* ===== 设计变量 ===== */
      :root {
        /* 品牌色 - 饱和度略降更柔和 */
        --brand: #0ea5e9;
        --brand-dark: #0284c7;
        /* 功能色 */
        --success: #10b981;
        --warning: #f59e0b;
        --error: #ef4444;
        --info: #3b82f6;
        /* 中性色阶梯 */
        --gray-0: #f9fafb;
        --gray-1: #f3f4f6;
        --gray-2: #e5e7eb;
        --gray-3: #d1d5db;
        --gray-4: #9ca3af;
        --gray-5: #6b7280;
        --gray-6: #4b5563;
        --gray-7: #374151;
        --gray-8: #1f2937;
        --gray-9: #111827;
        /* 圆角 */
        --radius-sm: 4px;
        --radius: 6px;
        --radius-lg: 12px;
        --radius-full: 999px;
        /* 按钮尺寸 */
        --btn-sm: 6px 12px;
        --btn-md: 8px 16px;
        --btn-lg: 12px 24px;
        /* 阴影 - 仅两层简约 */
        --shadow-sm: 0 1px 2px 0 rgba(0,0,0,.05);
        --shadow: 0 2px 6px rgba(0,0,0,.05);
        --shadow-md: 0 4px 12px rgba(0,0,0,.08);
        /* 动效 */
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --duration: 150ms;
        /* 旧兼容变量（过渡期内保留） */
        --bg: #f9fafb;
        --bg-grad-start: #f9fafb;
        --bg-grad-end: #f3f4f6;
        --card: #ffffff;
        --ink: var(--gray-9);
        --sub: var(--gray-5);
        --line: var(--gray-2);
        --accent: var(--brand);
        --accent-strong: var(--brand-dark);
        --accent-soft: #e0f2fe;
        --ok: var(--success);
        --err: var(--error);
      }
      body[data-theme="dark"] {
        /* 暗色模式覆盖 */
        --bg: var(--gray-9);
        --bg-grad-start: var(--gray-9);
        --bg-grad-end: var(--gray-8);
        --card: var(--gray-8);
        --ink: var(--gray-0);
        --sub: var(--gray-3);
        --line: var(--gray-7);
        --accent: var(--brand);
        --accent-strong: var(--brand-dark);
        --accent-soft: rgba(14, 165, 233, .12);
        --ok: var(--success);
        --err: var(--error);
        /* 暗色阴影降低透明度 */
        --shadow-sm: 0 1px 2px rgba(0,0,0,.15);
        --shadow: 0 2px 6px rgba(0,0,0,.2);
        --shadow-md: 0 4px 12px rgba(0,0,0,.25);
      }
        body {
          margin: 0;
          background: var(--bg);
          color: var(--ink);
          font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
          font-size: 14px;
          line-height: 1.5;
          position: relative;
          overflow-x: hidden;
          transition: background var(--duration) var(--ease), color var(--duration) var(--ease);
        }
        #bgFxLayer {
          position: fixed;
          inset: 0;
          pointer-events: none;
          z-index: 0;
          overflow: hidden;
          opacity: 1;
          transition: opacity 220ms var(--ease);
        }
        .bg-fx-blob {
          position: absolute;
          border-radius: 999px;
          filter: blur(14px);
          opacity: 0.24;
          transform: translate3d(0, 0, 0) scale(0.92);
          transition: transform 7400ms var(--ease), background 10000ms var(--ease), left 7400ms var(--ease), top 7400ms var(--ease), width 7400ms var(--ease), height 7400ms var(--ease);
          animation: blobBreath 20s ease-in-out infinite;
          will-change: transform, opacity, left, top, width, height;
        }
        @keyframes blobBreath {
          0% { transform: translate3d(0, 0, 0) scale(0.9); }
          50% { transform: translate3d(0, 0, 0) scale(1.06); }
          100% { transform: translate3d(0, 0, 0) scale(0.92); }
        }
        body[data-bgfx="off"] #bgFxLayer {
          opacity: 0;
        }
        .wrap {
          max-width: 1160px;
          margin: 24px auto;
          padding: 0 16px 32px;
          position: relative;
          z-index: 1;
        }
       .card {
         background: var(--card);
         border: 1px solid var(--line);
         border-radius: var(--radius-lg);
         padding: 24px;
         margin-bottom: 16px;
         box-shadow: var(--shadow);
         transition: box-shadow var(--duration) var(--ease);
       }
       .card:hover {
         box-shadow: var(--shadow-md);
       }
       h1 {
         margin: 0 0 8px;
         font-size: 24px;
         font-weight: 600;
       }
       h2 {
         margin: 0 0 8px;
         font-size: 16px;
         font-weight: 600;
       }
       .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
       /* ===== 表单控件 ===== */
        .input, .select, .textarea {
          border: 1px solid var(--line);
          border-radius: var(--radius);
          padding: 8px 12px;
          font-size: 14px;
          line-height: 1.5;
          background: var(--card);
          color: var(--ink);
          transition: border-color var(--duration) var(--ease),
            box-shadow var(--duration) var(--ease);
        }
        .input:focus, .select:focus, .textarea:focus, .textarea-code:focus {
          outline: none;
          border-color: var(--accent);
          box-shadow: 0 0 0 2px var(--accent-soft);
        }
        input[type="checkbox"] {
          accent-color: var(--accent);
        }
        body[data-theme="dark"] input[type="checkbox"] {
          color-scheme: dark;
          accent-color: var(--accent);
        }
       /* ===== 按钮体系 ===== */
       .btn {
         display: inline-flex;
         align-items: center;
         justify-content: center;
         gap: 4px;
          padding: var(--btn-md);
          font-size: 14px;
         font-weight: 500;
         line-height: 1;
         border-radius: var(--radius);
         border: 1px solid transparent;
         cursor: pointer;
         transition: all var(--duration) var(--ease);
         user-select: none;
       }
        .btn:disabled {
          opacity: 0.5;
          cursor: not-allowed;
        }
        .btn-lg {
          padding: var(--btn-lg);
          font-size: 15px;
        }
        .btn.loading {
          pointer-events: none;
          opacity: 0.7;
        }
        .btn.loading::after {
          content: "";
          display: inline-block;
          width: 14px;
          height: 14px;
          margin-left: 6px;
          border: 2px solid currentColor;
          border-top-color: transparent;
          border-radius: 50%;
          animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
       /* 主按钮 */
       .btn-primary {
         background: linear-gradient(135deg, var(--brand), var(--brand-dark));
         color: #fff;
         border-color: var(--brand-dark);
       }
       .btn-primary:hover:not(:disabled) {
         filter: brightness(1.05);
       }
       /* 次按钮 */
       .btn-secondary {
         background: var(--card);
         color: var(--ink);
         border-color: var(--line);
       }
       .btn-secondary:hover:not(:disabled) {
         border-color: var(--accent);
         color: var(--accent);
       }
       /* 文字按钮 */
       .btn-text {
         background: transparent;
         color: var(--accent);
         border-color: transparent;
       }
       .btn-text:hover:not(:disabled) {
         text-decoration: underline;
       }
       /* 危险按钮 */
       .btn-danger {
         background: var(--error);
         color: #fff;
         border-color: var(--error);
       }
       .btn-danger:hover:not(:disabled) {
         filter: brightness(1.05);
       }
       /* ===== 表格 ===== */
         .table {
           width: 100%;
           border-collapse: separate;
           border-spacing: 0;
           font-size: 14px;
           table-layout: fixed;
         }
        .table th {
          background: var(--gray-1);
          color: var(--gray-6);
          font-weight: 500;
          text-align: left;
         padding: 12px 8px;
          border-bottom: 2px solid var(--line);
        }
        .table-container {
          position: relative;
        }
        .table-container .table thead th {
          position: sticky;
          top: 0;
          z-index: 4;
          background: var(--gray-1);
          box-shadow: 0 1px 0 var(--line);
        }
        .table td {
          padding: 12px 8px;
          border-bottom: 1px solid var(--line);
          vertical-align: middle;
        }
        .table th:last-child,
        .table td:last-child {
          min-width: 120px;
          width: 132px;
          white-space: nowrap;
        }
       .table tbody tr:hover {
         background: color-mix(in srgb, var(--accent-soft) 50%, transparent);
       }
      .search-row-active td {
        background: color-mix(in srgb, var(--accent-soft) 78%, var(--card));
      }
      .doc-item.doc-active {
        background: color-mix(in srgb, var(--accent-soft) 82%, var(--card));
      }
      .muted { color: var(--sub); font-size: 13px; }
      .ok { color: var(--ok); }
      .err { color: var(--err); }
       /* ===== 标签 ===== */
       .pill {
         display: inline-block;
         padding: 4px 10px;
         border-radius: var(--radius-full);
         font-size: 12px;
         font-weight: 500;
       }
       .pill-success { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }
       .pill-warning { background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning); }
       .pill-error   { background: color-mix(in srgb, var(--error) 12%, transparent); color: var(--error); }
       .pill-info    { background: color-mix(in srgb, var(--info) 12%, transparent); color: var(--info); }
      .progressline { font-size:12px; color:var(--sub); }
       /* ===== 进度条 ===== */
       .pwrap { width: 260px; }
       .pbar {
         height: 4px;
         border-radius: var(--radius-full);
         overflow: hidden;
         background: var(--gray-2);
         margin-bottom: 6px;
       }
       .pfill {
         height: 100%;
         background: var(--brand);
         transition: width var(--duration) var(--ease);
       }
       .pfill.done { background: var(--success); }
       .pfill.fail { background: var(--error); }
       /* ===== 预览文本域 ===== */
         .textarea-code {
           width: 100%;
           min-height: 420px;
           font-family: Consolas, Monaco, monospace;
           font-size: 14px;
           line-height: 1.5;
           background: var(--card);
           color: var(--ink);
           caret-color: var(--ink);
           border: 1px solid var(--line);
           border-radius: var(--radius);
           padding: 8px 12px;
           resize: vertical;
          }
        .textarea-code::placeholder {
          color: var(--sub);
        }
        body[data-theme="dark"] .textarea-code {
          background: var(--gray-8);
        }
        /* ===== 弱提示 ===== */
        .weak-hint {
          color: var(--sub);
          font-size: 12px;
          opacity: 0;
          transition: opacity var(--duration) var(--ease);
        }
        .weak-hint.show {
          opacity: 1;
        }
        /* ===== 图标按钮 ===== */
        .btn-icon {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: 32px;
          height: 32px;
          padding: 0;
          border-radius: var(--radius);
          border: 1px solid transparent;
          background: transparent;
          color: var(--gray-5);
          cursor: pointer;
          transition: all var(--duration) var(--ease);
        }
        .btn-icon:hover {
          background: var(--gray-1);
          color: var(--accent);
        }
        .btn-icon svg {
          width: 18px;
          height: 18px;
        }
        .btn-icon-danger {
          color: var(--error);
        }
        .btn-icon-danger:hover {
          background: color-mix(in srgb, var(--error) 10%, transparent);
        }
        /* ===== 条目信息展示 ===== */
        .doc-item {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 8px;
          width: 100%;
          min-width: 0;
          border-radius: var(--radius);
          transition: background var(--duration) var(--ease);
        }
        .doc-item:hover {
          background: var(--gray-1);
        }
        .doc-filename {
          font-weight: 500;
          color: var(--ink);
          flex: 1;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .doc-meta {
          display: flex;
          gap: 8px;
          max-width: 0;
          overflow: hidden;
          opacity: 0;
          transition: opacity var(--duration) var(--ease), max-width var(--duration) var(--ease);
          font-size: 12px;
          color: var(--sub);
        }
        .doc-item:hover .doc-meta {
          max-width: 360px;
          opacity: 1;
        }
        .doc-meta-item {
          display: flex;
          align-items: center;
          gap: 4px;
          cursor: pointer;
          padding: 2px 6px;
          border-radius: var(--radius-sm);
          background: var(--gray-0);
          max-width: 180px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .doc-meta-item:hover {
          background: var(--accent-soft);
          color: var(--accent);
        }
        .doc-actions {
          display: flex;
          gap: 4px;
          justify-content: flex-end;
          align-items: center;
        }
        /* ===== 模态窗 ===== */
       .modal {
         position: fixed;
         inset: 0;
         background: rgba(15, 23, 42, 0.4);
         backdrop-filter: blur(9px) saturate(125%);
         -webkit-backdrop-filter: blur(9px) saturate(125%);
         display: none;
         align-items: center;
         justify-content: center;
         z-index: 999;
       }
       .modal.open { display: flex; }
       .modal-card {
          width: min(640px, 92vw);
          background: color-mix(in srgb, #ffffff 62%, transparent);
          backdrop-filter: blur(18px) saturate(150%);
          -webkit-backdrop-filter: blur(18px) saturate(150%);
          border: 1px solid color-mix(in srgb, var(--line) 68%, #ffffff 32%);
          border-radius: var(--radius-lg);
          padding: 24px;
          box-shadow: 0 10px 28px rgba(2, 8, 23, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.36);
        }
      .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
      .modal-result { min-height: 20px; font-size: 13px; }
      .guide-markdown {
        max-height: 68vh;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--card) 90%, var(--accent-soft));
        padding: 12px 14px;
        line-height: 1.6;
      }
      .guide-markdown h1,
      .guide-markdown h2,
      .guide-markdown h3 {
        margin: 8px 0;
        color: var(--ink);
      }
      .guide-markdown h1 { font-size: 20px; }
      .guide-markdown h2 { font-size: 16px; }
      .guide-markdown h3 { font-size: 14px; }
      .guide-markdown p,
      .guide-markdown li {
        color: var(--ink);
        font-size: 14px;
      }
      .guide-markdown ul,
      .guide-markdown ol {
        padding-left: 20px;
        margin: 8px 0;
      }
      .guide-markdown code {
        background: var(--gray-1);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: Consolas, Monaco, monospace;
        font-size: 12px;
      }
      body[data-theme="dark"] .guide-markdown {
        background: #1a2735;
        border-color: #324357;
      }
      body[data-theme="dark"] .guide-markdown code {
        background: #223143;
        border-color: #324357;
      }
      .fields-table-wrap {
        max-height: 52vh;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }
      .fields-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      .fields-table th,
      .fields-table td {
        padding: 8px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }
      .fields-table th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--gray-1);
        color: var(--gray-6);
      }
      .fields-table input[type="text"],
      .fields-table input[type="password"],
      .fields-table input[type="number"],
      .fields-table select {
        width: 100%;
        box-sizing: border-box;
      }
      .provider-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        flex-wrap: nowrap;
      }
      .provider-actions .btn {
        padding: var(--btn-sm);
        font-size: 12px;
        border-radius: var(--radius-sm);
        white-space: nowrap;
      }
      .provider-check {
        display: flex;
        justify-content: center;
      }
      .provider-detail {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: color-mix(in srgb, var(--card) 88%, var(--accent-soft));
      }
      .provider-detail-grid {
        display: grid;
        grid-template-columns: minmax(180px, 1.2fr) minmax(180px, 1.2fr) 72px 72px 72px 72px;
        gap: 8px;
      }
      .provider-detail-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .provider-detail-item label {
        font-size: 12px;
        color: var(--sub);
      }
      .provider-mini-input {
        width: 5ch !important;
        min-width: 5ch;
        text-align: center;
        padding-left: 6px;
        padding-right: 6px;
      }
      .provider-timeout-input::-webkit-outer-spin-button,
      .provider-timeout-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .provider-timeout-input {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .provider-temp-input {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .provider-temp-input::-webkit-outer-spin-button,
      .provider-temp-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .provider-row-main td {
        vertical-align: middle;
      }
      .provider-expand {
        padding: 6px 8px;
      }
      .provider-model-editor {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .provider-model-editor .select,
      .provider-model-editor .input {
        min-width: 0;
      }
      .provider-model-editor .btn {
        padding: var(--btn-sm);
        min-width: 28px;
      }
      .provider-key-row {
        position: relative;
        display: flex;
        align-items: center;
      }
      .provider-key-row .input {
        flex: 1;
        padding-right: 34px;
      }
      .provider-key-toggle {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: var(--sub);
        cursor: pointer;
        border-radius: 6px;
      }
      .provider-key-toggle:hover {
        color: var(--ink);
        background: color-mix(in srgb, var(--accent) 16%, transparent);
      }
      .provider-key-toggle svg {
        width: 16px;
        height: 16px;
      }
      body[data-theme="dark"] .provider-detail {
        background: #1a2735;
        border-color: #324357;
      }
      @media (max-width: 1000px) {
        .provider-detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      body[data-theme="dark"] .fields-table th {
        background: #223143;
        color: #c8d3e0;
        border-bottom-color: #324357;
      }
      body[data-theme="dark"] .fields-table .input,
      body[data-theme="dark"] .fields-table .select,
      body[data-theme="dark"] .fields-table input[type="text"],
      body[data-theme="dark"] .fields-table select {
        background: #1a2735;
        color: #e6edf5;
        border-color: #324357;
      }
      /* 复选框暗色模式 */
      body[data-theme="dark"] input[type="checkbox"] {
        accent-color: var(--accent);
        background: #1a2735;
        border-color: #324357;
      }
      body[data-theme="dark"] .table input[type="checkbox"],
      body[data-theme="dark"] .fields-table input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .field-tag {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: var(--radius-full);
        border: 1px solid var(--line);
        color: var(--sub);
      }
      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      .hero-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }
      .theme-mode-btn {
        background: color-mix(in srgb, var(--card) 86%, var(--accent-soft));
        border-color: color-mix(in srgb, var(--line) 78%, var(--accent-soft));
        color: var(--ink);
      }
      body[data-theme="dark"] .theme-mode-btn {
        background: color-mix(in srgb, #162233 68%, #26384a 32%);
        border-color: #3d5670;
        color: #dbeafe;
      }
      .steps {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 12px 0 18px;
      }
      /* ===== 主布局 - 栅格系统 ===== */
      .main-layout {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .upload-section {
        grid-column: 1 / -1;
      }
      .upload-section.drag-over {
        border-color: color-mix(in srgb, var(--accent) 52%, var(--line));
        background: color-mix(in srgb, var(--card) 84%, var(--accent-soft));
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 24%, transparent);
      }
      .bottom-grid {
        display: grid;
        grid-template-columns: 0.6fr 0.4fr;
        gap: 16px;
        align-items: stretch;
      }
      .section-card {
        background: color-mix(in srgb, #ffffff 64%, transparent);
        backdrop-filter: blur(16px) saturate(300%);

              'radial-gradient(circle, rgba(132,204,22,0.26) 0%, rgba(132,204,22,0.08) 56%, transparent 82%)',
              'radial-gradient(circle, rgba(96,165,250,0.32) 0%, rgba(96,165,250,0.11) 56%, transparent 82%)',
            ]
          : [
              'radial-gradient(circle, rgba(14,165,233,0.40) 0%, rgba(14,165,233,0.14) 56%, transparent 82%)',
              'radial-gradient(circle, rgba(16,185,129,0.37) 0%, rgba(16,185,129,0.13) 56%, transparent 82%)',
              'radial-gradient(circle, rgba(59,130,246,0.36) 0%, rgba(59,130,246,0.12) 56%, transparent 82%)',
              'radial-gradient(circle, rgba(6,182,212,0.36) 0%, rgba(6,182,212,0.12) 56%, transparent 82%)',
              'radial-gradient(circle, rgba(245,158,11,0.32) 0%, rgba(245,158,11,0.11) 56%, transparent 82%)',
              'radial-gradient(circle, rgba(249,115,22,0.32) 0%, rgba(249,115,22,0.11) 56%, transparent 82%)',
            ];
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function countInScreenBlobs() {
        return [...document.querySelectorAll('.bg-fx-blob')].filter((b) => b.dataset.inScreen === '1').length;
      }

      function chooseBlobTarget(blob, vw, vh, size) {
        const margin = Math.round(size * 0.7);
        const inScreenNow = blob.dataset.inScreen === '1';
        const currentInside = countInScreenBlobs();
        const maxInside = 4;

        let nextInside = false;
        if (inScreenNow) {
          nextInside = currentInside <= maxInside ? Math.random() < 0.45 : false;
        } else {
          nextInside = currentInside < maxInside && Math.random() < 0.55;
        }

        if (nextInside) {
          return {
            x: randomInt(-Math.round(size * 0.15), vw - Math.round(size * 0.7)),
            y: randomInt(-Math.round(size * 0.15), vh - Math.round(size * 0.7)),
            inScreen: true,
          };
        }

        const edge = randomInt(0, 3);
        if (edge === 0) return { x: -margin - randomInt(0, 120), y: randomInt(-margin, vh + margin), inScreen: false };
        if (edge === 1) return { x: vw + randomInt(0, 120), y: randomInt(-margin, vh + margin), inScreen: false };
        if (edge === 2) return { x: randomInt(-margin, vw + margin), y: -margin - randomInt(0, 120), inScreen: false };
        return { x: randomInt(-margin, vw + margin), y: vh + randomInt(0, 120), inScreen: false };
      }

      function applyBlobColor(blob) {
        const palette = getBgFxPalette();
        let idx = Number(blob.dataset.colorIdx || NaN);
        if (!Number.isFinite(idx)) {
          idx = randomInt(0, palette.length - 1);
          blob.dataset.colorIdx = String(idx);
        }
        blob.style.background = palette[idx % palette.length];
      }

      function moveBgBlob(blob, immediate = false) {
        if (document.body.getAttribute('data-bgfx') === 'off') {
          blob.style.opacity = '0';
          return;
        }
        const vw = Math.max(window.innerWidth || 1200, 900);
        const vh = Math.max(window.innerHeight || 800, 640);
        const size = randomInt(200, 460);
        const pos = chooseBlobTarget(blob, vw, vh, size);
        const scale = (Math.random() * 0.32 + 0.86).toFixed(3);
        const duration = randomInt(14000, 26000);

        if (immediate) {
          blob.style.transition = 'none';
        } else {
          blob.style.transition = `opacity ${Math.round(duration * 0.68)}ms var(--ease), transform ${duration}ms var(--ease), background ${Math.round(duration * 0.46)}ms var(--ease), left ${duration}ms var(--ease), top ${duration}ms var(--ease), width ${duration}ms var(--ease), height ${duration}ms var(--ease)`;
        }

        blob.style.width = `${size}px`;
        blob.style.height = `${size}px`;
        blob.style.left = `${pos.x}px`;
        blob.style.top = `${pos.y}px`;
        blob.style.opacity = pos.inScreen ? '0.28' : '0.24';
        blob.style.transform = `translate3d(0,0,0) scale(${scale})`;
        blob.dataset.inScreen = pos.inScreen ? '1' : '0';
        applyBlobColor(blob);
        blob.style.animationDelay = `${randomInt(0, 12000)}ms`;

        if (immediate) {
          requestAnimationFrame(() => {
            blob.style.transition = `opacity ${Math.round(duration * 0.68)}ms var(--ease), transform ${duration}ms var(--ease), background ${Math.round(duration * 0.46)}ms var(--ease), left ${duration}ms var(--ease), top ${duration}ms var(--ease), width ${duration}ms var(--ease), height ${duration}ms var(--ease)`;
          });
        }

      }

      function startBackgroundFxLoop() {
        if (bgFxLoopTimer) window.clearInterval(bgFxLoopTimer);
        bgFxLoopTimer = window.setInterval(() => {
          if (document.body.getAttribute('data-bgfx') === 'off') return;
          const blobs = [...document.querySelectorAll('.bg-fx-blob')];
          blobs.forEach((blob, idx) => {
            window.setTimeout(() => moveBgBlob(blob), idx * 180);
          });
        }, 6800);
      }

      function stopBackgroundFxLoop() {
        if (!bgFxLoopTimer) return;
        window.clearInterval(bgFxLoopTimer);
        bgFxLoopTimer = null;
      }

      function setBackgroundFxEnabled(enabled, persist = true) {
        document.body.setAttribute('data-bgfx', enabled ? 'on' : 'off');
        const btn = document.getElementById('bgFxToggleBtn');
        if (btn) {
          btn.textContent = enabled ? '✨' : '✨';
          btn.classList.toggle('btn-primary', enabled);
          btn.classList.toggle('btn-secondary', !enabled);
        }
        if (persist) localStorage.setItem(BG_FX_KEY, enabled ? 'on' : 'off');
        const blobs = document.querySelectorAll('.bg-fx-blob');
        blobs.forEach((blob) => {
          if (enabled) moveBgBlob(blob, true);
          else blob.style.opacity = '0';
        });
        if (enabled) startBackgroundFxLoop();
        else stopBackgroundFxLoop();
      }

      function initBackgroundFx() {
        const layer = document.getElementById('bgFxLayer');
        if (!layer) return;
        if (!layer.querySelector('.bg-fx-blob')) {

      function toggleBackgroundFx() {

      function h(v) {
        return String(v ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeRegExp(s) {
        return String(s || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function renderMarkdownToHtml(md) {
        const src = String(md || '').replace(/\r\n/g, '\n');
        const lines = src.split('\n');
        const html = [];
        let inUl = false;
        let inOl = false;
        let inCode = false;

        const closeLists = () => {
          if (inUl) {
            html.push('</ul>');
            inUl = false;
          }
          if (inOl) {
            html.push('</ol>');
            inOl = false;
          }
        };

        const inline = (text) => {
          let esc = h(text || '');
          esc = esc.replace(/`([^`]+)`/g, '<code>$1</code>');
          esc = esc.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
          esc = esc.replace(/\*([^*]+)\*/g, '<em>$1</em>');
          esc = esc.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
          return esc;
        };

        for (const rawLine of lines) {
          const line = rawLine || '';
          if (line.trim().startsWith('```')) {
            closeLists();
            if (!inCode) {
              html.push('<pre><code>');
              inCode = true;
            } else {
              html.push('</code></pre>');
              inCode = false;
            }
            continue;
          }
          if (inCode) {
            html.push(`${h(line)}\n`);
            continue;
          }

          const t = line.trim();
          if (!t) {
            closeLists();
            continue;
          }

          if (t.startsWith('### ')) {
            closeLists();
            html.push(`<h3>${inline(t.slice(4))}</h3>`);
            continue;
          }
          if (t.startsWith('## ')) {
            closeLists();
            html.push(`<h2>${inline(t.slice(3))}</h2>`);
            continue;
          }
          if (t.startsWith('# ')) {
            closeLists();
            html.push(`<h1>${inline(t.slice(2))}</h1>`);
            continue;
          }

          if (/^[-*]\s+/.test(t)) {
            if (!inUl) {
              if (inOl) {
                html.push('</ol>');
                inOl = false;
              }
              html.push('<ul>');
              inUl = true;
            }
            html.push(`<li>${inline(t.replace(/^[-*]\s+/, ''))}</li>`);
            continue;
          }

          if (/^\d+\.\s+/.test(t)) {
            if (!inOl) {
              if (inUl) {
                html.push('</ul>');
                inUl = false;
              }
              html.push('<ol>');
              inOl = true;
            }
            html.push(`<li>${inline(t.replace(/^\d+\.\s+/, ''))}</li>`);
            continue;
          }

          closeLists();
          html.push(`<p>${inline(t)}</p>`);
        }

        if (inCode) html.push('</code></pre>');
        closeLists();
        return html.join('');
      }

      async function withButtonLoading(btnEl, worker) {
        if (!btnEl) return worker();
        const wasDisabled = !!btnEl.disabled;
        btnEl.disabled = true;
        btnEl.classList.add('loading');
        try {
          return await worker();
        } finally {
          btnEl.classList.remove('loading');
          btnEl.disabled = wasDisabled;
        }
      }

          blobs.forEach((blob) => moveBgBlob(blob, true));

        if (saved === 'light' || saved === 'dark') {
          applyTheme(saved);

        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');

        const current = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';

      async function loadProviders() {
        const indexSelect = document.getElementById('indexProvider');
        const prevSelection = indexSelect.value;
        const res = await fetch(api('/providers'));
        const items = await res.json();
        providerConfigs = sortProviders(items);
        const availableModels = [];
        for (const p of providerConfigs) {
          if (!p.has_api_key || !p.enabled) continue;
          const provider = String(p.provider || '').trim();
          const current = String(p.model || '').trim();
          const presets = MODEL_PRESETS[provider.toLowerCase()] || [];
          const custom = getProviderCustomModels(provider);
          const models = [...new Set([current, ...presets, ...custom].filter(Boolean))];
          for (const model of models) {
            availableModels.push({ provider, model });
          }
        }
        const optionsHtml = availableModels
          .map(p => `<option value="${h(buildIndexSelectionValue(p.provider, p.model))}">${h(p.model)} (${h(p.provider)})</option>`)
          .join('');
        indexSelect.innerHTML = optionsHtml;

        if (availableModels.some(p => buildIndexSelectionValue(p.provider, p.model) === prevSelection)) {
          indexSelect.value = prevSelection;
        } else if (availableModels.length && !indexSelect.value) {
          indexSelect.value = buildIndexSelectionValue(availableModels[0].provider, availableModels[0].model);
        }
      }

      function buildIndexSelectionValue(provider, model) {
        return `${encodeURIComponent(String(provider || '').trim())}::${encodeURIComponent(String(model || '').trim())}`;
      }

      function parseIndexSelectionValue(val) {
        const raw = String(val || '');
        if (!raw) return { provider: '', model: '' };
        const parts = raw.split('::');
        if (parts.length < 2) return { provider: raw, model: '' };
        return {
          provider: decodeURIComponent(parts[0] || ''),
          model: decodeURIComponent(parts.slice(1).join('::') || ''),
        };
      }

      function sortProviders(items) {
        const order = new Map(DEFAULT_PROVIDER_ORDER.map((p, i) => [p, i]));
        return [...items].sort((a, b) => {
          const ai = order.has(a.provider) ? order.get(a.provider) : 999;
          const bi = order.has(b.provider) ? order.get(b.provider) : 999;
          if (ai !== bi) return ai - bi;
          return String(a.provider).localeCompare(String(b.provider));
        });
      }

      function isDefaultProvider(name) {
        return DEFAULT_PROVIDER_ORDER.includes(String(name || '').toLowerCase());
      }

      function getProviderOutput() {
        return document.getElementById('providerModalResult') || document.getElementById('providerResult');
      }

      function setProviderMessage(text, type = 'muted') {
        const output = getProviderOutput();

      }

          api_key_masked: p.api_key_masked || '',
          api_key_input: '',

          enabled: !!p.enabled,
          is_default: isDefaultProvider(p.provider),

      function renderModelEditor(row, index) {
        const provider = String(row.provider || '').trim().toLowerCase();
        const presets = MODEL_PRESETS[provider] || [];
        const custom = getProviderCustomModels(provider);
        const current = String(row.model || '');
        const options = [...new Set([...presets, ...custom])];
        if (current && !options.includes(current)) options.unshift(current);
        const optionsHtml = options
          .map(m => `<option value="${h(m)}" ${m === current ? 'selected' : ''}>${h(m)}</option>`)

      function getProviderCustomModelsMap() {
        try {
          const raw = localStorage.getItem(PROVIDER_CUSTOM_MODELS_KEY);
          const obj = raw ? JSON.parse(raw) : {};
          const mapObj = obj && typeof obj === 'object' ? obj : {};
          // 兼容旧版 openrouter 单键存储
          if (!mapObj.openrouter) {
            const legacyRaw = localStorage.getItem('li_openrouter_custom_models');
            const legacyArr = legacyRaw ? JSON.parse(legacyRaw) : [];
            if (Array.isArray(legacyArr) && legacyArr.length) {
              mapObj.openrouter = legacyArr;
            }
          }
          return mapObj;
        } catch (_) {
          return {};
        }
      }

      function setProviderCustomModelsMap(mapObj) {
        localStorage.setItem(PROVIDER_CUSTOM_MODELS_KEY, JSON.stringify(mapObj || {}));
      }

      function getProviderCustomModels(provider) {
        const key = String(provider || '').toLowerCase();
        if (!key) return [];
        const mapObj = getProviderCustomModelsMap();
        const arr = mapObj[key];
        if (!Array.isArray(arr)) return [];
        return arr.map(x => String(x || '').trim()).filter(Boolean);
      }

      function setProviderCustomModels(provider, models) {
        const key = String(provider || '').toLowerCase();
        if (!key) return;
        const clean = [...new Set((models || []).map(x => String(x || '').trim()).filter(Boolean))];
        const mapObj = getProviderCustomModelsMap();
        mapObj[key] = clean;
        setProviderCustomModelsMap(mapObj);
      }

      function getProviderRetriesMap() {
        try {
          const raw = localStorage.getItem(PROVIDER_RETRIES_KEY);
          const obj = raw ? JSON.parse(raw) : {};
          if (!obj || typeof obj !== 'object') return {};
          return obj;
        } catch (_) {
          return {};
        }
      }

      function setProviderRetriesMap(mapObj) {
        localStorage.setItem(PROVIDER_RETRIES_KEY, JSON.stringify(mapObj || {}));
      }

      function addProviderModel(index) {
        const row = providerDrafts[index];
        if (!row) return;
        const provider = String(row.provider || '').trim().toLowerCase();
        if (!provider) {
          setProviderMessage('请先填写接口名，再新增模型', 'err');
          return;
        }
        const name = (prompt(`请输入要新增的模型名（${provider}）`) || '').trim();
        if (!name) return;
        const defaults = new Set(MODEL_PRESETS[provider] || []);
        const custom = getProviderCustomModels(provider);
        if (defaults.has(name) || custom.includes(name)) {
          setProviderMessage('该模型已存在', 'muted');
          return;
        }
        custom.push(name);
        setProviderCustomModels(provider, custom);
        if (providerDrafts[index]) providerDrafts[index].model = name;
        renderProviderRows();
      }

      function removeProviderModel(index) {
        const row = providerDrafts[index];
        if (!row) return;
        const provider = String(row.provider || '').trim().toLowerCase();
        if (!provider) {
          setProviderMessage('请先填写接口名', 'err');
          return;
        }
        const current = String(row.model || '').trim();
        if (!current) {
          setProviderMessage('当前没有可删除的模型项', 'err');
          return;
        }
        const custom = getProviderCustomModels(provider);
        const presets = new Set(MODEL_PRESETS[provider] || []);
        const isPreset = presets.has(current);
        const isCustom = custom.includes(current);
        if (!isCustom && isPreset) {
          setProviderMessage('只能删除自定义模型项', 'err');
          return;
        }
        if (!confirm(`确定删除自定义模型 ${current} ?`)) return;
        setProviderCustomModels(provider, custom.filter(m => m !== current));
        const remainCustom = getProviderCustomModels(provider);
        const fallback = remainCustom[0] || (MODEL_PRESETS[provider] || [])[0] || '';
        row.model = fallback;
        renderProviderRows();
      }

      function updateProviderDraft(index, key, value) {
        if (!providerDrafts[index]) return;
        providerDrafts[index][key] = value;
      }

      function getProviderApiKeyInputValue(row) {
        if (!row) return '';
        if (row.api_key_mask_enabled && row.api_key_masked && !row.api_key_dirty && !row.api_key_input) {
          return row.api_key_masked;
        }
        return row.api_key_input || '';
      }

      function updateProviderApiKeyInput(index, value) {
        const row = providerDrafts[index];
        if (!row) return;
        const masked = row.api_key_masked || '';
        row.api_key_dirty = true;
        if (!String(value || '').trim()) {
          row.api_key_input = '';
          row.clear_api_key = !!masked;
          return;
        }
        if (row.api_key_mask_enabled && masked && value.includes('*')) {
          row.api_key_input = '';
          row.clear_api_key = false;
          return;
        }
        row.api_key_input = value;
        row.clear_api_key = false;
      }

      async function toggleProviderApiKeyMask(index) {
        const row = providerDrafts[index];
        if (!row) return;
        const provider = String(row.provider || '').trim();
        const toMasked = !row.api_key_mask_enabled;
        if (!toMasked && row.api_key_masked && !row.api_key_dirty && !row.api_key_input && provider) {
          try {
            const res = await fetch(api(`/providers/${encodeURIComponent(provider)}/api_key`));
            if (!res.ok) {
              setProviderMessage('读取 API Key 失败，请稍后重试', 'err');
              return;
            }
            const data = await res.json().catch(() => ({}));
            row.api_key_input = String(data.api_key || '');
            row.api_key_dirty = false;
            row.clear_api_key = false;
          } catch (_) {
            setProviderMessage('读取 API Key 失败，请稍后重试', 'err');
            return;
          }
        }
        row.api_key_mask_enabled = !row.api_key_mask_enabled;
        if (row.api_key_mask_enabled && !row.api_key_dirty) {
          row.api_key_input = '';

      async function deleteProviderRow(index) {

      function validateProviderRow(row) {
        if (!String(row.provider || '').trim()) return '接口名不能为空';
        if (!String(row.base_url || '').trim()) return `接口 ${row.provider} 的 Base URL 不能为空`;
        if (!String(row.model || '').trim()) return `接口 ${row.provider} 的模型不能为空`;
        const temperature = Number(row.temperature ?? 0.1);
        if (!Number.isFinite(temperature) || temperature < 0 || temperature > 2) return `接口 ${row.provider} 的温度必须在0-2之间`;
        const timeout = Number(row.timeout || 120);
        if (!Number.isFinite(timeout) || timeout < 10 || timeout > 300) return `接口 ${row.provider} 的超时必须在10-300之间`;
        const retries = Number(row.retries || 3);
        if (!Number.isFinite(retries) || retries < 1 || retries > 8) return `接口 ${row.provider} 的重试次数必须在1-8之间`;
        return '';
      }

      function snapshotProviderDrafts() {
        return providerDrafts.map((r) => ({
          provider: String(r.provider || '').trim(),
          base_url: String(r.base_url || '').trim(),
          model: String(r.model || '').trim(),
          api_key_input: !!r.api_key_dirty ? String(r.api_key_input || '') : '',
          clear_api_key: !!r.clear_api_key,
          temperature: Number(r.temperature ?? 0.1),
          timeout: Number(r.timeout || 120),
          retries: Number(r.retries || 3),
          enabled: !!r.enabled,
          is_default: !!r.is_default,
          _new: !!r._new,
        }));
      }

      function markProviderDraftBaseline() {
        providerDraftBaseline = JSON.stringify(snapshotProviderDrafts());
      }

      function hasUnsavedProviderChanges() {
        return JSON.stringify(snapshotProviderDrafts()) !== providerDraftBaseline;
      }

      async function saveProviderConfigs() {
        const rows = providerDrafts.map((r) => ({
          provider: String(r.provider || '').trim(),
          base_url: String(r.base_url || '').trim(),
          model: String(r.model || '').trim(),
          api_key_masked: r.api_key_masked || '',
          api_key_input: !!r.api_key_dirty ? String(r.api_key_input || '').trim() : '',
          clear_api_key: !!r.clear_api_key || (!!r.api_key_dirty && !String(r.api_key_input || '').trim() && !!r.api_key_masked),
          temperature: Number(r.temperature ?? 0.1),
          timeout: Number(r.timeout || 120),
          retries: Number(r.retries || 3),
          enabled: !!r.enabled,
        }));

        const names = rows.map(r => r.provider);
        const dup = names.find((n, i) => n && names.indexOf(n) !== i);
        if (dup) {
          setProviderMessage(`接口名重复: ${dup}`, 'err');
          return false;
        }
        for (const row of rows) {
          const err = validateProviderRow(row);
          if (err) {
            setProviderMessage(err, 'err');
            return false;
          }
        }

        const retryMap = getProviderRetriesMap();
        for (const row of rows) {
          const body = {
            base_url: row.base_url,
            model: row.model,
            api_key: row.api_key_input || null,
            clear_api_key: !!row.clear_api_key,
            temperature: Number(row.temperature ?? 0.1),
            timeout: Number(row.timeout || 120),
            enabled: !!row.enabled,
          };
          const res = await fetch(api(`/providers/${row.provider}`), {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            setProviderMessage(`保存失败：${row.provider}`, 'err');
            return false;
          }
          retryMap[row.provider] = row.retries;
        }
        setProviderRetriesMap(retryMap);
        setProviderMessage('Provider 配置已保存', 'ok');
        await loadProviders();
        await loadProviderDrafts();
        markProviderDraftBaseline();
        return true;
      }

      async function testProviderRow(index) {
        const row = providerDrafts[index];
        if (!row) return;
        const provider = String(row.provider || '').trim();
        if (!provider) {
          setProviderMessage('请先填写接口名', 'err');
          return;
        }
        const err = validateProviderRow({
          provider,
          base_url: row.base_url,
          model: row.model,
          temperature: row.temperature,
          timeout: row.timeout,
        });
        if (err) {
          setProviderMessage(err, 'err');
          return;
        }

        // 先保存当前行，再测试，确保测试的是最新配置
        const saveRes = await fetch(api(`/providers/${provider}`), {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            base_url: String(row.base_url || '').trim(),
            model: String(row.model || '').trim(),
            api_key: String(row.api_key_input || '').trim() || null,
            clear_api_key: !!row.clear_api_key,
            temperature: Number(row.temperature ?? 0.1),
            timeout: Number(row.timeout || 120),
            enabled: !!row.enabled,
          }),
        });
        if (!saveRes.ok) {
          setProviderMessage(`测试前保存失败：${provider}`, 'err');
          return;
        }

        setProviderMessage(`测试中：${provider}...`, 'muted');
        const res = await fetch(api(`/providers/${provider}/test`), { method: 'POST' });

        const data = await res.json();

          `${provider}: ${data.success ? '成功' : '失败'} | ${data.message} | ${data.elapsed_seconds || 0}s`,
          data.success ? 'ok' : 'err'
        );
        await loadProviders();
        await loadProviderDrafts();
        markProviderDraftBaseline();
      }

      async function saveFieldsConfig() {
        const cleaned = fieldConfigs.map((f, idx) => ({
          field_key: String(f.field_key || '').trim(),
          label: String(f.label || '').trim(),
          field_type: FIELD_TYPES.includes(f.field_type) ? f.field_type : 'text',
          required: !!f.required,
          enabled: !!f.enabled,
          sort_order: idx + 1,
          is_default: !!f.is_default,
        }));

        const invalid = cleaned.find(x => !x.field_key || !x.label);
        if (invalid) {
          setFieldsMessage('字段 Key 和显示名不能为空', 'err');
          return;
        }
        const keySet = new Set();
        for (const item of cleaned) {
          if (keySet.has(item.field_key)) {
            setFieldsMessage(`字段 Key 重复: ${item.field_key}`, 'err');
            return;
          }
          keySet.add(item.field_key);
        }

        const res = await fetch(api('/fields'), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cleaned),
        });
        if (!res.ok) {
          setFieldsMessage('保存失败', 'err');
          return;
        }
        setFieldsMessage('字段配置已保存', 'ok');
        await loadFieldsConfig();
      }

      function hasDraggedFiles(evt) {
        const types = evt?.dataTransfer?.types;
        if (!types) return false;
        return Array.from(types).includes('Files');
      }

      function bindUploadDragDrop() {
        const section = document.getElementById('uploadSection');
        if (!section) return;

        section.addEventListener('dragenter', (evt) => {
          if (!hasDraggedFiles(evt)) return;
          evt.preventDefault();
          uploadDragDepth += 1;
          section.classList.add('drag-over');
        });

        section.addEventListener('dragover', (evt) => {
          if (!hasDraggedFiles(evt)) return;
          evt.preventDefault();
          if (evt.dataTransfer) evt.dataTransfer.dropEffect = 'copy';
        });

        section.addEventListener('dragleave', (evt) => {
          evt.preventDefault();
          uploadDragDepth = Math.max(0, uploadDragDepth - 1);
          if (uploadDragDepth === 0) {
            section.classList.remove('drag-over');
          }
        });

        section.addEventListener('drop', async (evt) => {
          if (!hasDraggedFiles(evt)) return;
          evt.preventDefault();
          uploadDragDepth = 0;
          section.classList.remove('drag-over');
          const files = [...(evt.dataTransfer?.files || [])];
          await uploadFiles(files, '拖拽');
        });
      }

      async function uploadFiles(files, source = '选择') {
        if (!files.length) return;
        const output = document.getElementById('indexResult');
        output.className = 'muted';
        output.textContent = `正在${source}上传 ${files.length} 个文件...`;

        let ok = 0;
        let fail = 0;
        for (const file of files) {
          const fd = new FormData();
          fd.append('file', file);
          const res = await fetch(api('/files/upload'), { method: 'POST', body: fd });
          if (res.ok) ok += 1;
          else fail += 1;
        }

        output.className = fail === 0 ? 'ok' : 'err';
        output.textContent = `上传完成：成功 ${ok}，失败 ${fail}`;
        await refreshDocs();
      }

        return withButtonLoading(btnEl, async () => {
          const output = document.getElementById('indexResult');
          output.className = 'muted';
          output.textContent = '正在刷新模型与上传区列表...';
          try {
            await loadProviders();
            await refreshDocs();
            output.className = 'ok';
            output.textContent = '已刷新模型下拉栏与上传区文件';
          } catch (e) {
            output.className = 'err';
            output.textContent = `刷新失败: ${e}`;

      async function refreshDocs() {
        const res = await fetch(api('/files'));
        const rows = await res.json();
        const pendingRows = rows.filter(r => r.status !== 'indexed');
        indexedTotalCount = rows.filter(r => r.status === 'indexed').length;
        updateSearchCountHint();
        uploadRowsCache = pendingRows;
        const validIds = new Set(pendingRows.map(r => r.id));
        [...selectedUploadDocs].forEach(id => {
          if (!validIds.has(id)) selectedUploadDocs.delete(id);
        });
        dotTick = (dotTick + 1) % 4;
        const dots = '.'.repeat(dotTick);
        document.getElementById('docRows').innerHTML = pendingRows.map(r => `
          <tr>
            <td><input type="checkbox" class="selUpload" value="${r.id}" ${selectedUploadDocs.has(r.id) ? 'checked' : ''} onchange="toggleUploadSelect('${r.id}', this.checked)" /></td>
            <td class="doc-clickable" onclick="previewIndex('${r.id}')">
              <div class="doc-item">
                <span class="doc-filename" title="${h(r.filename)}">${h(r.filename)}</span>
                <div class="doc-meta">
                  <span class="doc-meta-item" onclick="event.stopPropagation();copyToClipboard('${h(r.id)}')" title="点击复制ID">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    ${h(r.id.substring(0, 8))}...
                  </span>
                </div>
              </div>
            </td>
            <td><span class="pill pill-${r.status === 'parsing' ? 'warning' : 'info'}">${h(r.status)}</span></td>
            <td class="progressline">${renderProgressBlock(r, dots)}</td>
            <td><div class="doc-actions">${renderUploadActions(r)}</div></td>
          </tr>
        `).join('');

        document.getElementById('uploadEmpty').style.display = pendingRows.length ? 'none' : 'block';
        document.getElementById('uploadTableWrap').style.display = pendingRows.length ? 'block' : 'none';
        document.getElementById('uploadBulkActions').style.display = pendingRows.length ? 'flex' : 'none';
        syncUploadSelectAllState();
        await loadIndexedRows();

        const hasParsing = pendingRows.some(r => r.status === 'parsing');
        if (hasParsing) {
          startAutoRefresh();
        } else if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
      }

      function toggleUploadSelect(docId, checked) {
        if (checked) selectedUploadDocs.add(docId);
        else selectedUploadDocs.delete(docId);
        syncUploadSelectAllState();
      }

      function toggleUploadSelectAll() {
        const master = document.getElementById('uploadSelectAll');
        const allIds = uploadRowsCache.map(r => r.id);
        if (master.checked) allIds.forEach(id => selectedUploadDocs.add(id));
        else allIds.forEach(id => selectedUploadDocs.delete(id));
        refreshDocs();
      }

      function syncUploadSelectAllState() {
        const master = document.getElementById('uploadSelectAll');
        if (!master) return;
        const allIds = uploadRowsCache.map(r => r.id);
        const selected = allIds.filter(id => selectedUploadDocs.has(id)).length;
        master.checked = allIds.length > 0 && selected === allIds.length;
        master.indeterminate = selected > 0 && selected < allIds.length;
      }

      async function pauseSelectedUploads() {
        const ids = [...selectedUploadDocs];
        if (!ids.length) {
          const output = document.getElementById('indexResult');
          output.className = 'err';
          output.textContent = '请先选择要暂停的条目';
          return;
        }
        let ok = 0;
        for (const id of ids) {
          const res = await fetch(api(`/index/${id}/cancel`), { method: 'POST' });
          if (res.ok) ok += 1;
        }
        const output = document.getElementById('indexResult');
        output.className = ok > 0 ? 'ok' : 'err';
        output.textContent = `已请求暂停 ${ok}/${ids.length} 条`;
        await refreshDocs();
      }

      async function deleteSelectedUploads() {
        const ids = [...selectedUploadDocs];
        if (!ids.length) {
          const output = document.getElementById('indexResult');
          output.className = 'err';
          output.textContent = '请先选择要删除的条目';
          return;
        }
        if (!confirm(`确定删除选中的 ${ids.length} 条文献？`)) return;
        let ok = 0;
        for (const id of ids) {
          if (streamRefs[id]) {
            streamRefs[id].close();
            streamRefs[id] = null;
          }
          streamDone[id] = true;
          delete liveProgress[id];
          const res = await fetch(api(`/files/${id}`), { method: 'DELETE' });
          if (res.ok) ok += 1;
          selectedUploadDocs.delete(id);
        }
        const output = document.getElementById('indexResult');
        output.className = ok > 0 ? 'ok' : 'err';
        output.textContent = `已删除 ${ok}/${ids.length} 条文献`;
        await refreshDocs();
      }

          </button>
          <button class="btn-icon btn-icon-danger" onclick="deleteDoc('${r.id}')" title="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>

              <div class="doc-actions">
                <button class="btn-icon" onclick="window.open('/api/files/${id}/original')" title="原文件">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </button>
                <button class="btn-icon" onclick="previewIndex('${id}')" title="预览">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>

                <button class="btn-icon" onclick="resetForRegenerate('${id}')" title="重新生成">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
                <button class="btn-icon" onclick="window.open('/api/export/${id}')" title="导出">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>

                <button class="btn-icon btn-icon-danger" onclick="deleteDoc('${id}')" title="删除">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>

        }).join('');

        const hasRows = sortedRows.length > 0;
        const emptyEl = document.getElementById('searchEmpty');
        const tableWrap = document.querySelector('.search-table-wrap');
        if (emptyEl) emptyEl.style.display = hasRows ? 'none' : 'flex';
        if (tableWrap) tableWrap.style.display = hasRows ? 'block' : 'none';
