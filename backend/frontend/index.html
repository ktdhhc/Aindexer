      function updateSearchCountHint() {
        const hint = document.getElementById('searchCountHint');
        if (!hint) return;
        hint.textContent = `当前索引总数：${indexedTotalCount}`;
      }

      function formatCreatedAt(value) {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value || '');
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function formatCreatedAtShort(value) {
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value || '');
        const pad = (n) => String(n).padStart(2, '0');
        return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      function renderSearchTimeValue(row) {
        if (searchTimeField === 'created_at') {
          return row?.created_at ? formatCreatedAtShort(row.created_at) : '-';
        }
        const y = Number(row?.year || 0);
        return y > 0 ? String(y) : '-';
      }

      function sortSearchRows(rows) {
        const list = [...rows];
        const byName = (a, b) => String(a.filename || '').localeCompare(String(b.filename || ''), 'zh-CN', { sensitivity: 'base' });
        const byYear = (a, b) => {
          const ya = Number(a.year || 0);
          const yb = Number(b.year || 0);
          if (ya !== yb) return ya - yb;
          const ta = Date.parse(a.created_at || '');
          const tb = Date.parse(b.created_at || '');
          return (Number.isNaN(ta) ? 0 : ta) - (Number.isNaN(tb) ? 0 : tb);
        };
        const byCreated = (a, b) => {
          const ta = Date.parse(a.created_at || '');
          const tb = Date.parse(b.created_at || '');
          return (Number.isNaN(ta) ? 0 : ta) - (Number.isNaN(tb) ? 0 : tb);
        };
        if (searchSortField === 'filename') {
          list.sort((a, b) => searchSortDirection === 'asc' ? byName(a, b) : byName(b, a));
        } else {
          const byTime = searchTimeField === 'created_at' ? byCreated : byYear;
          list.sort((a, b) => searchSortDirection === 'asc' ? byTime(a, b) : byTime(b, a));
        }
        return list;
      }

      function setSearchSort(field) {
        if (searchSortField === field) {
          searchSortDirection = searchSortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          searchSortField = field;
          searchSortDirection = field === 'filename' ? 'asc' : 'desc';
        }
        updateSortGuide();
        renderSearchRows(searchRowsCache);
      }

      function onSearchTimeFieldChange(field) {
        if (field !== 'year' && field !== 'created_at') return;
        searchTimeField = field;
        updateSortGuide();
        renderSearchRows(searchRowsCache);
      }

      function updateSortGuide() {
        const fileBtn = document.getElementById('sortHeaderFilename');
        const timeBtn = document.getElementById('sortHeaderTime');
        const fieldPicker = document.getElementById('searchTimeFieldPicker');
        if (!fileBtn || !timeBtn || !fieldPicker) return;
        const arrow = (dir) => (dir === 'desc' ? '↑' : '↓');
        const fileDir = searchSortField === 'filename' ? searchSortDirection : '';
        const timeDir = searchSortField === 'time' ? searchSortDirection : '';
        if (fieldPicker.value !== searchTimeField) {
          fieldPicker.value = searchTimeField;
        }
        const timeLabel = searchTimeField === 'created_at' ? '生成时间' : '年份';
        fileBtn.innerHTML = `文件名 <span class="arrow">${fileDir ? arrow(fileDir) : '↕'}</span>`;
        timeBtn.innerHTML = `${timeLabel} <span class="arrow">${timeDir ? arrow(timeDir) : '↕'}</span>`;
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          // 可选：显示复制成功提示
        }).catch(() => {
          // 降级方案
          const input = document.createElement('input');
          input.value = text;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
        });
      }

      function toggleSearchSelect(docId, checked) {
        if (checked) selectedSearchDocs.add(docId);
        else selectedSearchDocs.delete(docId);
        syncSelectAllState();
      }

      function toggleSelectAll() {
        const master = document.getElementById('selectAll');
        const allIds = searchRowsCache.map(r => r.doc_id || r.id);
        if (master.checked) {
          allIds.forEach(id => selectedSearchDocs.add(id));
        } else {
          allIds.forEach(id => selectedSearchDocs.delete(id));
        }
        renderSearchRows(searchRowsCache);
      }

      function syncSelectAllState() {
        const master = document.getElementById('selectAll');
        if (!master) return;
        const allIds = searchRowsCache.map(r => r.doc_id || r.id);
        const selected = allIds.filter(id => selectedSearchDocs.has(id)).length;
        master.checked = allIds.length > 0 && selected === allIds.length;
        master.indeterminate = selected > 0 && selected < allIds.length;
      }

      function renderProgressBlock(r, dots) {
        const p = liveProgress[r.id] || defaultProgress(r);
        const cls = r.status === 'indexed' ? 'done' : (r.status === 'needs_review' || r.status === 'failed' || r.status === 'cancelled' ? 'fail' : '');
        const info = h(renderDynamicInfo(r, dots, p));
        return `<div class="pwrap"><div class="pbar"><div class="pfill ${cls}" style="width:${Math.max(0, Math.min(100, p.progress || 0))}%"></div></div><div>${info}</div></div>`;
      }

      function defaultProgress(r) {
        const map = { uploaded: 5, queued: 15, parsing: 35, llm_request: 60, writing: 85, completed: 100, failed: 100, cancelled: 100 };
        const key = r.id;
        if (r.stage === 'cancel_requested') {
          const prev = pseudoProgress[key] || 45;
          const next = Math.min(98, prev + 2);
          pseudoProgress[key] = next;
        } else if (r.status === 'parsing' && r.stage === 'llm_request') {
          const prev = pseudoProgress[key] || 60;
          const next = Math.min(92, prev + 2);
          pseudoProgress[key] = next;
        } else if (r.status === 'parsing' && r.stage === 'parsing') {
          const prev = pseudoProgress[key] || 35;
          const next = Math.min(58, prev + 1);
          pseudoProgress[key] = next;
        } else if (r.status === 'indexed') {
          pseudoProgress[key] = 100;
        } else if (r.status === 'needs_review' || r.status === 'cancelled' || r.status === 'failed') {
          pseudoProgress[key] = 100;
        }
        const progress = pseudoProgress[key] || map[r.stage || 'uploaded'] || 10;
        return {
          progress,
          stage: r.stage,
          stage_message: r.stage_message,
          error_message: r.error_message,
        };
      }

      function renderDynamicInfo(r, dots, progressData) {
        const pd = progressData || {};
        if (r.stage === 'cancel_requested') {
          return `正在中断 ${pd.progress || 0}% | ${pd.stage_message || r.stage_message || '后台清理中'}`;
        }
        if (r.status === 'parsing') {
          return `处理中${dots} ${pd.progress || 0}% | 当前阶段：${pd.stage || r.stage || '处理中'}${(pd.stage_message || r.stage_message) ? ' | ' + (pd.stage_message || r.stage_message) : ''}`;
        }
        if (r.status === 'indexed') {
          return `已完成 100% | ${pd.stage_message || r.stage_message || '索引可预览和导出'}`;
        }
        if (r.status === 'needs_review') {
          return `处理失败 | ${pd.error_message || r.error_message || '请手动修正或重试'}`;
        }
        if (r.status === 'cancelled') {
          return `已中断 100%${(pd.stage_message || r.stage_message) ? ' | ' + (pd.stage_message || r.stage_message) : ''}`;
        }
        return pd.stage_message || r.stage_message || '等待处理';
      }

      function getRetryCount(provider) {
        const name = String(provider || '').trim();
        if (!name) return 3;
        const retryMap = getProviderRetriesMap();
        const raw = Number(retryMap[name] || 3);
        if (!Number.isFinite(raw)) return 3;
        return Math.max(1, Math.min(8, Math.trunc(raw)));
      }

      function getSelectedTargetForIndex() {
        const val = document.getElementById('indexProvider')?.value || '';
        if (val) {
          const picked = parseIndexSelectionValue(val);
          if (picked.provider && picked.model) return picked;
        }
        const first = (providerConfigs || []).find(p => p.has_api_key && p.enabled && p.model);
        if (!first) return { provider: '', model: '' };
        return { provider: String(first.provider || ''), model: String(first.model || '') };
      }

      async function runIndex(docId) {
        const output = document.getElementById('indexResult');
        const target = getSelectedTargetForIndex();
        const provider = target.provider;
        const model = target.model;
        if (!provider || !model) {
          output.className = 'err';
          output.textContent = '没有可用模型，请先配置并保存有效的 API Key';
          return;
        }
        const retries = getRetryCount(provider);
        output.className = 'muted';
        output.textContent = `正在提交任务：${docId}...`;

        const startRes = await fetch(api(`/index/${docId}/run?provider=${encodeURIComponent(provider)}&model=${encodeURIComponent(model)}&retries=${retries}`), { method: 'POST' });
        const startData = await startRes.json().catch(() => ({}));
        if (!startRes.ok) {
          output.className = 'err';
          output.textContent = startData.detail || '任务启动失败';
          return;
        }
        if (startData.status === 'cleanup_pending') {
          output.className = 'muted';
          output.textContent = startData.message || '上次中断任务仍在清理，请稍后重试';
          return;
        }

        if (streamRefs[docId]) {
          streamRefs[docId].close();
          streamRefs[docId] = null;
        }
        streamDone[docId] = false;

        const url = api(`/index/${docId}/run_stream?provider=${encodeURIComponent(provider)}&model=${encodeURIComponent(model)}&retries=${retries}`);
        const es = new EventSource(url);
        streamRefs[docId] = es;
        output.className = 'ok';
        output.textContent = `任务已提交：${docId}，正在接收流式进度...`;

        es.onmessage = async (evt) => {
          try {
            const data = JSON.parse(evt.data || '{}');
            liveProgress[docId] = data;
            if (data.stage_message) {
              output.className = data.status === 'needs_review' || data.status === 'failed' ? 'err' : 'ok';
              output.textContent = `${docId} | ${data.progress || 0}% | ${data.stage_message}`;
            }
            await refreshDocs();
            if (data.done) {
              streamDone[docId] = true;
              es.close();
              streamRefs[docId] = null;
              delete liveProgress[docId];
            }
          } catch (e) {
            output.className = 'err';
            output.textContent = `流式进度解析失败: ${e}`;
          }
        };

        es.onerror = () => {
          if (streamDone[docId]) {
            return;
          }
          const lp = liveProgress[docId] || {};
          if (['indexed', 'needs_review', 'cancelled', 'failed'].includes(lp.status)) {
            streamDone[docId] = true;
            es.close();
            streamRefs[docId] = null;
            return;
          }
          output.className = 'err';
          output.textContent = `流式连接中断：${docId}，请刷新后查看最终状态`;
          es.close();
          streamRefs[docId] = null;
        };

        await refreshDocs();
        startAutoRefresh();
      }

      function startAutoRefresh() {
        if (refreshTimer) return;
        refreshTimer = setInterval(refreshDocs, 2500);
      }

      async function runAllIndexing(btnEl) {
        return withButtonLoading(btnEl, async () => {
          const target = getSelectedTargetForIndex();
          const provider = target.provider;
          const model = target.model;
          const retries = getRetryCount(provider);
          const output = document.getElementById('indexResult');
          if (!provider || !model) {
            output.className = 'err';
            output.textContent = '没有可用模型，请先在配置接口中填写并保存 API Key';
            return;
          }
          output.className = 'muted';
          output.textContent = '正在提交批量任务...';
          const res = await fetch(api(`/index/run_all?provider=${encodeURIComponent(provider)}&model=${encodeURIComponent(model)}&retries=${retries}`), { method: 'POST' });
          const data = await res.json();
          if (!res.ok) {
            output.className = 'err';
            output.textContent = data.detail || '批量提交失败';
            return;
          }
          output.className = 'ok';
          output.textContent = `已入队 ${data.queued} 条，跳过 ${data.skipped} 条（并发上限 ${data.max_concurrency}）`;
          await refreshDocs();
          startAutoRefresh();
        });
      }

      async function cancelIndex(docId) {
        await fetch(api(`/index/${docId}/cancel`), { method: 'POST' });
        if (streamRefs[docId]) {
          streamRefs[docId].close();
          streamRefs[docId] = null;
        }
        streamDone[docId] = true;
        delete liveProgress[docId];
        await refreshDocs();
      }

      async function deleteDoc(docId) {
        if (!confirm(`确定删除 ${docId} ?`)) return;
        if (streamRefs[docId]) {
          streamRefs[docId].close();
          streamRefs[docId] = null;
        }
        streamDone[docId] = true;
        delete liveProgress[docId];
        selectedSearchDocs.delete(docId);
        await fetch(api(`/files/${docId}`), { method: 'DELETE' });
        await refreshDocs();
      }

      async function resetForRegenerate(docId) {
        if (!confirm(`确定清空索引并回退到待处理区？\n${docId}`)) return;
        const res = await fetch(api(`/index/${docId}/reset`), { method: 'POST' });
        const data = await res.json();
        const output = document.getElementById('indexResult');
        if (!res.ok) {
          output.className = 'err';
          output.textContent = data.detail || '重置失败';
          return;
        }
        output.className = 'ok';
        output.textContent = `已重置 ${docId}，文献已回到待处理区`;
        selectedSearchDocs.delete(docId);
        await refreshDocs();
      }

      async function searchDocs(btnEl) {
        return withButtonLoading(btnEl, async () => {
          await loadIndexedRows({ autoPreviewFirst: true });
        });
      }

      async function clearSearchInput() {
        const input = document.getElementById('searchQ');
        if (!input) return;
        input.value = '';
        updateSearchClearButton();
        renderPreviewKeywordHighlight();
        await loadIndexedRows({ autoPreviewFirst: true });
        input.focus();
      }

      function updateSearchClearButton() {
        const input = document.getElementById('searchQ');
        const btn = document.getElementById('searchClearBtn');
        if (!input || !btn) return;
        btn.style.display = String(input.value || '').trim() ? 'inline-flex' : 'none';
      }

      async function showAllIndexed(btnEl) {
        return withButtonLoading(btnEl, async () => {
          await clearSearchInput();
        });
      }

      async function loadIndexedRows(options = {}) {
        const autoPreviewFirst = !!options.autoPreviewFirst;
        const q = document.getElementById('searchQ').value;
        const url = new URL(window.location.origin + api('/search'));
        url.searchParams.set('status', 'indexed');
        if (q) url.searchParams.set('q', q);
        const res = await fetch(url.toString());
        const rows = await res.json();
        renderSearchRows(rows);
        syncPreviewSearchHeights();
        if (!autoPreviewFirst) return;
        if (previewEditMode) return;
        const first = (rows || [])[0];
        const firstId = first ? (first.doc_id || first.id) : '';
        if (!firstId) {
          currentPreviewDocId = '';
          return;
        }
        if (firstId === currentPreviewDocId) return;
        await previewIndex(firstId);
      }

      function syncPreviewSearchHeights() {
        const previewRender = document.getElementById('previewRender');
        const previewBox = document.getElementById('previewBox');
        const searchWrap = document.querySelector('.search-table-wrap');
        if (!previewRender || !previewBox || !searchWrap) return;

        const header = searchWrap.querySelector('thead');
        const firstRow = searchWrap.querySelector('tbody tr');
        const headerH = header ? Math.ceil(header.getBoundingClientRect().height) : 44;
        const rowH = firstRow ? Math.ceil(firstRow.getBoundingClientRect().height) : 46;
        const target = headerH + rowH * 8 + 2;

        const hPx = `${target}px`;
        searchWrap.style.height = hPx;
        searchWrap.style.maxHeight = hPx;
        previewRender.style.height = hPx;
        previewRender.style.minHeight = hPx;
        previewRender.style.maxHeight = hPx;
        previewBox.style.height = hPx;
        previewBox.style.minHeight = hPx;
        previewBox.style.maxHeight = hPx;
      }

      async function previewIndex(docId) {
        const id = docId || document.getElementById('previewDocId').value;
        if (!id) return;
        const canSwitch = await confirmPreviewSwitchIfEditing(id);
        if (!canSwitch) return;
        currentPreviewDocId = id;
        renderSearchRows(searchRowsCache);
        document.getElementById('previewDocId').value = id;
        const box = document.getElementById('previewBox');
        const status = document.getElementById('previewStatus');
        box.value = '加载中...';
        status.className = 'muted';
        status.textContent = `正在加载 ${id} 的索引内容...`;
        const res = await fetch(api(`/index/${id}/markdown`));
        const data = await res.json();
        if (!res.ok) {
          previewMarkdownRaw = String(data.detail || '预览失败');
          box.value = previewMarkdownRaw;
          status.className = 'err';
          status.textContent = data.detail || '预览失败';
          renderPreviewKeywordHighlight();
          return;
        }
        previewMarkdownRaw = String(data.markdown || '');
        box.value = previewMarkdownRaw;
        status.className = 'ok';
        status.textContent = `已加载 ${id}，可复制索引或 APA 引用`;
        renderPreviewKeywordHighlight();
      }

      function isPreviewDirty() {
        if (!previewEditMode) return false;
        const box = document.getElementById('previewBox');
        if (!box) return false;
        return String(box.value || '') !== String(previewMarkdownRaw || '');
      }

      function setPreviewEditMode(enabled) {
        const box = document.getElementById('previewBox');
        const btn = document.getElementById('previewEditBtn');
        const render = document.getElementById('previewRender');
        if (!box || !btn || !render) return;
        previewEditMode = !!enabled;
        if (previewEditMode) {
          box.value = previewMarkdownRaw || '';
          box.style.display = 'block';
          render.style.display = 'none';
          btn.textContent = '完成';
          btn.classList.remove('btn-secondary');
          btn.classList.add('btn-primary');
          box.focus();
          return;
        }
        box.style.display = 'none';
        render.style.display = 'block';
        btn.textContent = '编辑';
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-secondary');
      }

      async function confirmPreviewSwitchIfEditing(nextDocId) {
        if (!previewEditMode) return true;
        if (!nextDocId || nextDocId === currentPreviewDocId) return true;
        if (!isPreviewDirty()) {
          setPreviewEditMode(false);
          return true;
        }
        const shouldSave = window.confirm('当前预览有未保存修改。点击“确定”先保存后再切换；点击“取消”将放弃修改并切换。');
        if (shouldSave) {
          const ok = await savePreviewMarkdown(document.getElementById('previewEditBtn'));
          if (!ok) return false;
        }
        setPreviewEditMode(false);
        return true;
      }

      async function togglePreviewEdit() {
        const box = document.getElementById('previewBox');
        const btn = document.getElementById('previewEditBtn');
        if (!box || !btn) return;
        if (!previewEditMode) {
          setPreviewEditMode(true);
          return;
        }
        previewMarkdownRaw = box.value || '';
        const ok = await savePreviewMarkdown(btn);
        if (!ok) return;
        setPreviewEditMode(false);
        renderPreviewKeywordHighlight();
      }

      function getSearchTerms() {
        const q = String(document.getElementById('searchQ')?.value || '').trim();
        if (!q) return [];
        const terms = q.split(/[\s,，;；]+/g).map(x => x.trim()).filter(Boolean);
        if (!terms.length) return [];
        return [...new Set([q, ...terms])].sort((a, b) => b.length - a.length);
      }

      function renderPreviewKeywordHighlight() {
        const panel = document.getElementById('previewRender');
        if (!panel) return;
        const text = String(previewMarkdownRaw || '');
        const terms = getSearchTerms();
        if (!text.trim()) {
          panel.innerHTML = '<span class="muted">这里显示 Markdown 索引内容</span>';
          return;
        }
        panel.style.display = 'block';
        if (!terms.length) {
          panel.innerHTML = h(text).replace(/\n/g, '<br>');
          return;
        }
        const pattern = terms.map(escapeRegExp).join('|');
        const rx = new RegExp(pattern, 'gi');
        const highlighted = h(text).replace(rx, (m) => `<mark>${m}</mark>`).replace(/\n/g, '<br>');
        panel.innerHTML = highlighted;
      }

      function getPreviewCurrentText() {
        if (previewEditMode) {
          return String(document.getElementById('previewBox')?.value || '');
        }
        return String(previewMarkdownRaw || '');
      }

      async function copyPreviewMarkdown() {
        const text = getPreviewCurrentText();
        const status = document.getElementById('previewStatus');
        if (!text.trim()) {
          status.className = 'err';
          status.textContent = '当前没有可复制的索引内容';
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          status.className = 'ok';
          status.textContent = '索引内容已复制到剪贴板';
        } catch (_) {
          status.className = 'err';
          status.textContent = '复制失败，请使用 Ctrl+C 手动复制';
        }
      }

      async function savePreviewMarkdown(btnEl) {
        return withButtonLoading(btnEl, async () => {
          const id = document.getElementById('previewDocId').value;
          const text = getPreviewCurrentText();
          const status = document.getElementById('previewStatus');
          if (!id) {
            status.className = 'err';
            status.textContent = '请先加载有效的 DocID';
            return false;
          }
          status.className = 'muted';
          status.textContent = `正在保存 ${id} 的索引内容...`;
          let res = await fetch(api(`/index/${id}/markdown`), {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ markdown: text }),
          });
          if (res.status === 405) {
            res = await fetch(api(`/index/${id}/markdown`), {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ markdown: text }),
            });
          }
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            status.className = 'err';
            status.textContent = data.detail || '保存失败';
            return false;
          }
          status.className = 'muted';
          status.textContent = `已保存 ${id}，正在刷新预览与搜索结果...`;
          await previewIndex(id);
          await loadIndexedRows();
          await refreshDocs();
          return true;
        });
      }

      async function copyApaCitation() {
        const text = getPreviewCurrentText();
        const status = document.getElementById('previewStatus');
        const apa = extractApaCitation(text);
        if (!apa) {
          status.className = 'err';
          status.textContent = '未找到 APA 引用，请先加载有效索引';
          return;
        }
        try {
          await navigator.clipboard.writeText(apa);
          status.className = 'ok';
          status.textContent = 'APA 引用已复制到剪贴板';
        } catch (_) {
          status.className = 'err';
          status.textContent = '复制失败，请手动复制 APA 引用';
        }
      }

      function extractApaCitation(markdown) {
        const marker = '# APA 引用';
        const start = markdown.indexOf(marker);
        if (start < 0) return '';
        const rest = markdown.slice(start + marker.length).trimStart();
        const end = rest.indexOf('\n# ');
        const block = end >= 0 ? rest.slice(0, end) : rest;
        return block.split('\n').map(s => s.trim()).filter(Boolean).join(' ');
      }

      async function exportBatch() {
        const ids = [...selectedSearchDocs];
        if (!ids.length) return;
        const res = await fetch(api('/export/batch'), {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(ids)
        });
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'indexes_merged.md';
        a.click();
      }

      function exportAll() {
        window.open('/api/export/all');
      }

      async function deleteSelectedDocs() {
        const ids = [...selectedSearchDocs];
        if (!ids.length) return;
        if (!confirm(`确定删除选中的 ${ids.length} 条文献吗？`)) return;
        for (const docId of ids) {
          if (streamRefs[docId]) {
            streamRefs[docId].close();
            streamRefs[docId] = null;
          }
          streamDone[docId] = true;
          delete liveProgress[docId];
          await fetch(api(`/files/${docId}`), { method: 'DELETE' });
          selectedSearchDocs.delete(docId);
        }
        await refreshDocs();
      }

      init();
    </script>
  </body>
</html>
