<!DOCTYPE html>
<html class="dark" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translator Validation Shell</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0b1326',
              surface: '#0b1326',
              'surface-container-lowest': '#060e20',
              'surface-container-low': '#131b2e',
              'surface-container': '#171f33',
              'surface-container-high': '#222a3d',
              'surface-container-highest': '#2d3449',
              'on-background': '#dae2fd',
              'on-surface': '#dae2fd',
              primary: '#89ceff',
              'primary-container': '#0ea5e9',
              secondary: '#93ccff',
              error: '#ffb4ab',
            },
            fontFamily: {
              sans: ['Inter', 'Segoe UI', 'PingFang SC', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>
  <body class="h-screen flex flex-col">
    <header class="flex-none h-16 border-b border-white/10 bg-surface-container-lowest/50 flex items-center justify-between px-6">
      <div class="flex items-center gap-4">
        <h1 class="text-lg font-bold">Translator Validation</h1>
        
        <!-- Upload Section -->
        <div class="flex items-center gap-2 ml-4">
          <input type="file" id="uploadFileInput" accept=".pdf" class="hidden" />
          <button id="uploadBtn" class="px-3 py-1.5 rounded-lg bg-primary/20 text-primary hover:bg-primary/30 text-sm font-medium transition-colors flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">upload</span>
            Upload PDF
          </button>
          <span id="uploadStatus" class="text-xs text-slate-400 hidden"></span>
        </div>
        
        <div class="h-6 w-px bg-white/10 mx-2"></div>
        
        <!-- Document Selector -->
        <div class="flex items-center gap-2">
          <select id="documentSelect" class="bg-surface-container border border-white/10 rounded-lg px-3 py-1.5 text-sm focus:ring-1 focus:ring-primary/50">
            <option value="">Select Document...</option>
          </select>
          <button id="loadDocBtn" class="px-3 py-1.5 rounded-lg bg-primary/20 text-primary hover:bg-primary/30 text-sm font-medium transition-colors">Load</button>
          <button id="refreshDocsBtn" class="p-1.5 rounded-lg hover:bg-white/10 text-slate-400" title="Refresh document list">
            <span class="material-symbols-outlined text-sm">refresh</span>
          </button>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative flex items-center">
          <span class="material-symbols-outlined absolute left-3 text-slate-400 text-sm">search</span>
          <input type="text" id="searchInput" class="translator-search-input bg-surface-container border border-white/10 rounded-lg pl-9 pr-3 py-1.5 text-sm focus:ring-1 focus:ring-primary/50 w-64" placeholder="Search in PDF preview text..." />
          <span id="searchCount" class="absolute right-3 text-xs text-slate-500"></span>
        </div>
        <button id="searchPrevBtn" class="p-1.5 rounded-lg hover:bg-white/10 text-slate-400"><span class="material-symbols-outlined text-sm">arrow_upward</span></button>
        <button id="searchNextBtn" class="p-1.5 rounded-lg hover:bg-white/10 text-slate-400"><span class="material-symbols-outlined text-sm">arrow_downward</span></button>
      </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
      <!-- Viewer Area -->
      <div class="flex-1 flex flex-col relative border-r border-white/10 bg-surface-container-lowest">
        <div id="viewerEmpty" class="translator-empty-state absolute inset-0 flex flex-col items-center justify-center text-slate-500">
          <span class="material-symbols-outlined text-4xl mb-2">description</span>
          <p>Select a document to preview the original PDF</p>
        </div>
        <div id="viewerError" class="translator-error absolute inset-0 hidden flex-col items-center justify-center text-error bg-error/5">
          <span class="material-symbols-outlined text-4xl mb-2">error</span>
          <p id="viewerErrorText">Failed to load document</p>
        </div>
        <div id="viewerContent" class="translator-viewer-shell thin-scrollbar flex-1 hidden"></div>
      </div>

      <!-- Side Panel -->
      <aside class="translator-sidepanel w-[28rem] flex flex-col bg-surface-container-low">
        <!-- Provider Config Section -->
        <div class="p-4 border-b border-white/10">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">settings</span>
              Provider Settings
            </h2>
            <select id="configProviderSelect" class="bg-surface-container border border-white/10 rounded px-2 py-1 text-xs">
              <option value="">Loading...</option>
            </select>
          </div>
          
          <div id="providerConfigForm" class="space-y-3">
            <div>
              <label class="text-xs text-slate-400 block mb-1">Base URL</label>
              <input type="text" id="configBaseUrl" class="w-full bg-surface-container border border-white/10 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-primary/50" placeholder="https://api.example.com/v1" />
            </div>
            <div>
              <label class="text-xs text-slate-400 block mb-1">Model</label>
              <input type="text" id="configModel" class="w-full bg-surface-container border border-white/10 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-primary/50" placeholder="model-name" />
            </div>
            <div>
              <label class="text-xs text-slate-400 block mb-1">API Key</label>
              <input type="password" id="configApiKey" class="w-full bg-surface-container border border-white/10 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-primary/50" placeholder="Enter API key" />
              <div id="configApiKeyStatus" class="text-[10px] text-slate-500 mt-1 hidden"></div>
            </div>
            <div class="flex gap-2 pt-1">
              <button id="saveConfigBtn" class="flex-1 px-3 py-1.5 rounded bg-primary/20 text-primary hover:bg-primary/30 text-xs font-medium transition-colors flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-xs">save</span>
                Save
              </button>
              <button id="testConfigBtn" class="flex-1 px-3 py-1.5 rounded bg-surface-container-high text-slate-300 hover:bg-surface-container-highest text-xs font-medium transition-colors flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-xs">network_check</span>
                Test
              </button>
            </div>
            <div id="configMessage" class="text-xs hidden"></div>
          </div>
        </div>
        
        <!-- Translation Section -->
        <div class="p-4 border-b border-white/10 flex items-center justify-between">
          <h2 class="font-semibold flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">translate</span>
            Translation
          </h2>
          <div class="flex gap-2 items-center">
            <select id="providerSelect" class="bg-surface-container border border-white/10 rounded px-2 py-1 text-xs">
              <option value="">Loading...</option>
            </select>
            <button id="thinkingToggleBtn" class="px-2 py-1 rounded border border-white/10 text-xs text-slate-400 bg-surface-container-high/40 cursor-not-allowed flex items-center gap-1 transition-colors" disabled title="Enable extended reasoning mode">
              <span class="material-symbols-outlined text-sm">psychology</span>
              Think
            </button>
            <button id="cancelTranslationBtn" class="px-2 py-1 rounded border border-white/10 text-xs text-slate-400 bg-surface-container-high/40 cursor-not-allowed" disabled>
              Cancel
            </button>
          </div>
        </div>
        
        <div class="flex-1 overflow-y-auto thin-scrollbar p-4 flex flex-col gap-4">
          <div id="sidepanelEmpty" class="translator-empty-state flex flex-col items-center justify-center text-slate-500 h-32 text-sm text-center">
            <span class="material-symbols-outlined text-2xl mb-2">touch_app</span>
            <p>Select text directly in the PDF preview<br>to translate</p>
          </div>
          
          <div id="sidepanelLoading" class="hidden flex-col items-center justify-center text-primary h-32">
            <span class="material-symbols-outlined animate-spin text-2xl mb-2">sync</span>
            <p class="text-sm">Translating...</p>
          </div>

          <div id="sidepanelError" class="translator-error hidden p-3 rounded-lg bg-error/10 border border-error/20 text-error text-sm">
            <div class="flex items-start gap-2">
              <span class="material-symbols-outlined text-base">error</span>
              <p id="sidepanelErrorText" class="flex-1 break-words"></p>
            </div>
          </div>

          <div id="sidepanelContent" class="hidden flex-col gap-4">
            <div class="bg-surface-container rounded-lg p-3 border border-white/5">
              <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-semibold">Source</div>
              <div id="sourceText" class="text-sm text-slate-300 line-clamp-4 italic"></div>
            </div>
            <div class="bg-primary/5 rounded-lg p-3 border border-primary/20">
              <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-2">
                  <div class="text-[10px] uppercase tracking-wider text-primary font-semibold">Translation</div>
                  <span id="translationCached" class="hidden px-1.5 py-0.5 rounded text-[9px] bg-primary/20 text-primary">Cached</span>
                </div>
                <div id="translationMetrics" class="translator-metrics text-[10px] text-slate-300"></div>
              </div>
              <div id="translatedText" class="translator-sidepanel-output text-sm text-white leading-relaxed"></div>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
